version: '3.8'

# PGVector'lı PostgreSQL instance'ı
# Tek komutla başlat: docker-compose up -d

services:
  postgres:
    image: pgvector/pgvector:pg16   # pgvector extension dahil resmi imaj
    container_name: rag-poc-postgres
    environment:
      POSTGRES_DB: ragpoc
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
